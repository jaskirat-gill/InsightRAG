name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-checks:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-checks:
    name: Backend Dependency and Syntax Checks
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - backend/sync-service
          - backend/query-engine
          - backend/document-processing-engine
          - backend/mcp-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install service dependencies
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt; skipping dependency install"
          fi

      - name: Validate Python syntax
        working-directory: ${{ matrix.service }}
        run: python -m compileall -q .

  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs:
      - frontend-checks
      - backend-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build project images
        run: docker compose -f docker-compose.yml build

  smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs:
      - docker-build

    env:
      S3_BUCKET_NAME: ""
      AWS_REGION: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      SQS_QUEUE_URL: ""
      SYNC_INTERVAL_SECONDS: "0"
      VITE_API_URL: ""
      VITE_OPENWEBUI_BASE_URL: ""
      VITE_OPENWEBUI_TOKEN: ""
      VITE_OPENWEBUI_TIMEOUT_MS: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start required services
        run: docker compose -f docker-compose.yml up -d postgres redis qdrant query-engine sync-service

      - name: Wait for services to become healthy
        run: |
          timeout 120 bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} $(docker compose ps -q postgres))" = "healthy" ]; do sleep 2; done'
          timeout 120 bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} $(docker compose ps -q redis))" = "healthy" ]; do sleep 2; done'
          timeout 120 bash -c 'until curl -fsS http://localhost:8000/health | grep -q "\"status\":\"healthy\""; do sleep 2; done'
          timeout 120 bash -c 'until curl -fsS http://localhost:8001/health | grep -q "\"status\":\"healthy\""; do sleep 2; done'

      - name: Print compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.yml down -v

  deploy-production:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - smoke-test
    if: github.ref == 'refs/heads/main'

    env:
      DO_APP_PATH: ${{ secrets.DO_APP_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_SSH_HOST }}
          username: ${{ secrets.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: 22
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e
            APP_PATH="${DO_APP_PATH:-/home/deploy/OpenWebUI-Project}"
            cd "$APP_PATH"

            git fetch origin
            git checkout main
            git pull origin main

            docker compose -f docker-compose.yml pull || true
            docker compose -f docker-compose.yml up -d --build
