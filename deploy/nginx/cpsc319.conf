# Nginx on the Droplet: single SSL entry point for frontend + backend APIs.
# - Enable: sudo ln -sf /etc/nginx/sites-available/cpsc319 /etc/nginx/sites-enabled/
# - Reload: sudo nginx -t && sudo systemctl reload nginx
# - Frontend: run container with ports "8080:80" so this can proxy to 127.0.0.1:8080 (or proxy to 80 if nginx listens on another port).

server {
    listen 80;
    server_name cpsc319.jaskiratgill.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cpsc319.jaskiratgill.ca;

    ssl_certificate /etc/letsencrypt/live/cpsc319.jaskiratgill.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cpsc319.jaskiratgill.ca/privkey.pem;

    # Frontend SPA (Docker frontend container; use 8080:80 in compose so this proxies to 127.0.0.1:8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # sync-service (auth, knowledge-bases, plugins, /sync)
    location /api/sync/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # query-engine
    location /api/query/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # mcp-server
    location /api/mcp/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
