version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - query-engine

  sync-service:
    build: ./backend/sync-service
    ports:
      - "8000:8000"
    volumes:
      - ./backend/sync-service:/app:z
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - QDRANT_URL=http://qdrant:6333
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  query-engine:
    build: ./backend/query-engine
    ports:
      - "8001:8001"
    volumes:
      - ./backend/query-engine:/app:z
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  document-processing-engine:
    build: ./backend/document-processing-engine
    volumes:
      - ./backend/document-processing-engine:/app:z
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openwebui
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d openwebui"]
      interval: 3s
      timeout: 3s
      retries: 10
  qdrant:
    image: qdrant/qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: