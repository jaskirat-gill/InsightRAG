services:
  frontend:
    image: ghcr.io/jaskirat-gill/openwebui-frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_OPENWEBUI_BASE_URL: ${VITE_OPENWEBUI_BASE_URL:-}
        VITE_OPENWEBUI_TOKEN: ${VITE_OPENWEBUI_TOKEN:-}
        VITE_OPENWEBUI_TIMEOUT_MS: ${VITE_OPENWEBUI_TIMEOUT_MS:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    # No source mount: production serves pre-built static assets from image (avoids 504 "Outdated Optimize Dep" from Vite dev server).
    # For local dev with hot reload, run: cd frontend && npm run dev
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_OPENWEBUI_BASE_URL=${VITE_OPENWEBUI_BASE_URL}
      - VITE_OPENWEBUI_TOKEN=${VITE_OPENWEBUI_TOKEN}
      - VITE_OPENWEBUI_TIMEOUT_MS=${VITE_OPENWEBUI_TIMEOUT_MS}
    depends_on:
      - query-engine

  sync-service:
    image: ghcr.io/jaskirat-gill/openwebui-sync-service:latest
    build: ./backend/sync-service
    ports:
      - "8000:8000"
    volumes:
      - ./backend/sync-service:/app:z
      - ./backend/shared:/shared:z
      - ./backend/database:/db-sql:z
      - shared_downloads:/data/downloads
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/shared
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - DB_SQL_DIR=/db-sql
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
      - SYNC_INTERVAL_SECONDS=${SYNC_INTERVAL_SECONDS}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  query-engine:
    image: ghcr.io/jaskirat-gill/openwebui-query-engine:latest
    build: ./backend/query-engine
    ports:
      - "8001:8001"
    volumes:
      - ./backend/query-engine:/app:z
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  document-processing-engine:
    image: ghcr.io/jaskirat-gill/openwebui-document-processing-engine:latest
    build: ./backend/document-processing-engine
    volumes:
      - ./backend/document-processing-engine:/app:z
      - ./backend/shared:/shared:z
      - shared_downloads:/data/downloads
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/shared
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openwebui
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d openwebui"]
      interval: 3s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
  mcp-server:
    image: ghcr.io/jaskirat-gill/openwebui-mcp-server:latest
    build: ./backend/mcp-server
    ports:
      - "8002:8002"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8002
    depends_on:
      - qdrant

  mcp-server-stdio:
    image: ghcr.io/jaskirat-gill/openwebui-mcp-server:latest
    build: ./backend/mcp-server
    environment:
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql://user:password@postgres:5432/openwebui
      - MCP_TRANSPORT=stdio
    stdin_open: true
    depends_on:
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
  shared_downloads:
