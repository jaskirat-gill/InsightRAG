server {
    listen 80;
    server_name cpsc319.jaskiratgill.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cpsc319.jaskiratgill.ca;

    ssl_certificate /etc/letsencrypt/live/cpsc319.jaskiratgill.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cpsc319.jaskiratgill.ca/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /config.js {
        add_header Cache-Control "no-store, no-cache";
    }

    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
